services:
  postgres:
    image: postgres:16
    container_name: appfolio_ai_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appfolio_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: appfolio_ai_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
